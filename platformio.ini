[env:esp12f]
platform = espressif8266
board = esp12e
framework = arduino

; ===== 芯片主频：160 MHz =====
board_build.f_cpu = 160000000L

; ===== Flash 配置（4MB） =====
; 4MB Flash，3MB SPIFFS 文件系统（适合需要大存储或 OTA 升级）
board_build.ldscript = eagle.flash.4m.ld

; Flash 工作模式：QIO（四线模式，速度最快）
board_build.flash_mode = qio

; Flash 工作频率：40 MHz（稳定兼容）
board_build.f_flash = 40000000L

; ===== 串口上传速度（可选） =====
upload_speed = 74880

; ===== 板级环境配置（可选） =====
; 确保 GPIO0 正确配置为上拉（ESP-12F 默认）
board_build.esp8266_ldscript = eagle.flash.4m.ld

lib_deps = 
    links2004/WebSockets