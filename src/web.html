<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>ESP8266 无线串口调试器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #2d2d3a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffaa44;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            background: #3a3a4a;
            padding: 12px 16px;
            border-radius: 12px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2d2d3a;
            padding: 5px 12px;
            border-radius: 24px;
        }
        .control-group label {
            font-weight: bold;
            font-size: 0.9rem;
        }
        select, button {
            background: #4a4a5a;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        select:hover, button:hover {
            background: #6a6a7a;
        }
        button:active {
            transform: scale(0.97);
        }
        button.stop {
            background: #8b3c3c;
        }
        button.stop:hover {
            background: #a54c4c;
        }
        button.start {
            background: #3c6e47;
        }
        button.start:hover {
            background: #4e8a5c;
        }
        .data-area {
            margin: 16px 0;
        }
        .data-label {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        textarea {
            width: 100%;
            background: #1e1e2a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid #4a4a5a;
            border-radius: 12px;
            padding: 12px;
            resize: vertical;
        }
        #receivedData {
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #sendData {
            height: 100px;
            margin-bottom: 12px;
        }
        .send-button {
            background: #2c6e9e;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .status {
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            color: #aaa;
            border-top: 1px solid #4a4a5a;
            padding-top: 12px;
        }
        .footer {
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            color: #888;
        }
        @media (max-width: 600px) {
            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .control-group {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 无线串口调试器</h1>
    <div class="control-bar">
        <div class="control-group">
            <label>⚙️ 波特率:</label>
            <select id="baudRate">
                <option value="300">300</option>
                <option value="600">600</option>
                <option value="1200">1200</option>
                <option value="2400">2400</option>
                <option value="4800">4800</option>
                <option value="9600">9600</option>
                <option value="14400">14400</option>
                <option value="19200">19200</option>
                <option value="28800">28800</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
                <option value="115200" selected>115200</option>
                <option value="230400">230400</option>
                <option value="460800">460800</option>
                <option value="921600">921600</option>
            </select>
        </div>
        <div class="control-group">
            <label>🎛️ 监听:</label>
            <button id="btnStart" class="start">▶ 开始监听</button>
            <button id="btnStop" class="stop">⏹️ 停止监听</button>
        </div>
        <div class="control-group">
            <span id="wsStatus" style="color:#ffaa44;">● 未连接</span>
        </div>
    </div>

    <div class="data-area">
        <div class="data-label">📥 接收数据 (来自串口)</div>
        <textarea id="receivedData" readonly placeholder="点击「开始监听」后，这里会显示收到的串口数据..."></textarea>
    </div>

    <div class="data-area">
        <div class="data-label">📤 发送数据 (通过串口发送)</div>
        <textarea id="sendData" placeholder="输入要发送的文本或十六进制数据..."></textarea>
        <button id="btnSend" class="send-button">✉️ 发送数据</button>
    </div>
    <div class="status">
        💡 提示: 需要先点击「开始监听」才能看到接收数据。发送按钮不受监听状态影响。
        <br>确保外部设备与 ESP8266 的 TX/RX 交叉连接并共地。
    </div>
    <div class="footer">
        ESP8266 无线串口调试器 | 热点: <strong>SerialMonitor</strong> 密码: <strong>12345678</strong>
    </div>
</div>

<script>
    let ws = null;
    let isWebSocketOpen = false;
    const receivedTextarea = document.getElementById('receivedData');
    const sendTextarea = document.getElementById('sendData');
    const baudSelect = document.getElementById('baudRate');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnSend = document.getElementById('btnSend');
    const wsStatusSpan = document.getElementById('wsStatus');

    function connectWebSocket() {
        const host = window.location.hostname;
        const wsUrl = `ws://${host}:81`;
        ws = new WebSocket(wsUrl);
        
        ws.onopen = function() {
            console.log('WebSocket 连接成功');
            isWebSocketOpen = true;
            wsStatusSpan.innerHTML = '● 已连接';
            wsStatusSpan.style.color = '#88ff88';
        };
        
        ws.onmessage = function(event) {
            // 接收来自 ESP8266 串口的数据
            let data = event.data;
            // 追加到接收文本框
            receivedTextarea.value += data;
            // 自动滚动到底部
            receivedTextarea.scrollTop = receivedTextarea.scrollHeight;
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket 错误:', error);
            wsStatusSpan.innerHTML = '⚠️ 连接错误';
            wsStatusSpan.style.color = '#ff8888';
        };
        
        ws.onclose = function() {
            console.log('WebSocket 断开');
            isWebSocketOpen = false;
            wsStatusSpan.innerHTML = '● 未连接';
            wsStatusSpan.style.color = '#ffaa44';
            // 尝试重连
            setTimeout(connectWebSocket, 2000);
        };
    }

    // 发送数据到 ESP8266 (通过串口发送到外部设备)
    function sendSerialData() {
        if (!isWebSocketOpen) {
            alert('WebSocket 未连接, 请刷新页面');
            return;
        }
        let data = sendTextarea.value;
        if (data.length === 0) return;
        // 通过 WebSocket 发送, 服务端收到后会通过串口发出
        ws.send(data);
        // 可选: 在接收区也回显一下发送的内容 (加个标记)
        // 但为了模拟真实串口调试器, 暂时不自动回显, 如果外部设备会回传数据, 则能显示
        // 为了方便, 可以在本地增加一个本地回显 (注释掉, 更真实)
        // 如果想本地回显发送内容, 可以取消下面注释:
        // receivedTextarea.value += "[SENT] " + data + "\n";
        // receivedTextarea.scrollTop = receivedTextarea.scrollHeight;
    }

    // 设置波特率
    function setBaudRate() {
        if (!isWebSocketOpen) {
            alert('WebSocket 未连接, 请等待连接成功后再修改波特率');
            return;
        }
        let baud = baudSelect.value;
        // 通过 WebSocket 发送特殊指令: "BAUD:xxxxx"
        ws.send(`BAUD:${baud}`);
    }

    // 开始监听: 告诉 ESP8266 将串口收到的数据转发到 WebSocket
    function startMonitor() {
        if (!isWebSocketOpen) {
            alert('WebSocket 未连接');
            return;
        }
        ws.send("CMD:START_MONITOR");
        // 界面反馈: 清除旧数据 (可选)
        // receivedTextarea.value = "";
    }

    // 停止监听
    function stopMonitor() {
        if (!isWebSocketOpen) {
            alert('WebSocket 未连接');
            return;
        }
        ws.send("CMD:STOP_MONITOR");
    }

    // 绑定事件
    btnSend.addEventListener('click', sendSerialData);
    btnStart.addEventListener('click', startMonitor);
    btnStop.addEventListener('click', stopMonitor);
    baudSelect.addEventListener('change', setBaudRate);

    // 页面加载后连接 WebSocket
    connectWebSocket();
    
    // 支持 Ctrl+Enter 快速发送
    sendTextarea.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            sendSerialData();
        }
    });
</script>
</body>
</html>
